version: "3"

vars:
  BINARY: calcmark-lark

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY}} .
    sources:
      - "**/*.go"
      - static/**
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  test:
    desc: Run tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  staticcheck:
    internal: true
    cmds:
      - go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  modernize:
    internal: true
    cmds:
      - go run golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@latest ./...
      - echo '✓ Modernize check passed'

  lint:
    desc: Run all linters (vet, staticcheck, modernize)
    cmds:
      - task: vet
      - task: staticcheck
      - task: modernize

  tidy:
    desc: Tidy and verify go.mod
    cmds:
      - go mod tidy
      - go mod verify

  release:
    desc: Full check — tidy, lint, test, then build
    cmds:
      - task: tidy
      - task: lint
      - task: test
      - task: build

  run:
    desc: Build and run locally with debug logging
    deps: [build]
    cmds:
      - ./{{.BINARY}} --debug

  dev:
    desc: Watch for changes, rebuild, and restart (Ctrl+C to stop)
    watch: true
    sources:
      - "**/*.go"
      - static/**
      - go.mod
    cmds:
      - kill $(lsof -ti:8080) 2>/dev/null || true
      - go build -o {{.BINARY}} .
      - ./{{.BINARY}} --debug &

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
