<style>
/* === Design Tokens === */
:root {
  --color-primary: #7D56F4;
  --color-primary-hover: #6644d8;
  --color-text: #1a1a1a;
  --color-text-muted: #555;
  --color-text-faint: #888;
  --color-bg: #ffffff;
  --color-bg-subtle: #f6f8fa;
  --color-border: #d1d5db;
  --color-border-strong: #9ca3af;
  --color-code-bg: #f3f4f6;
  --color-code-text: #1a1a1a;
  --color-success: #1a7f37;
  --color-error: #cf222e;
  --font-sans: "Inter", system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  --radius-sm: 4px;
  --radius-md: 6px;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
  --transition-fast: 120ms ease;
  --transition-base: 200ms ease;
}
[data-theme="dark"] {
  --color-primary: #a371f7;
  --color-primary-hover: #b78df9;
  --color-text: #e5e5e5;
  --color-text-muted: #8b949e;
  --color-text-faint: #6e7781;
  --color-bg: #0d1117;
  --color-bg-subtle: #161b22;
  --color-border: #30363d;
  --color-border-strong: #6e7681;
  --color-code-bg: #161b22;
  --color-code-text: #e5e5e5;
  --color-success: #3fb950;
  --color-error: #f85149;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
}

/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-sans);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  transition: background-color var(--transition-base), color var(--transition-base);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* === Nav === */
.nav {
  height: 48px;
  border-bottom: 1px solid var(--color-border);
  backdrop-filter: blur(8px);
  background: color-mix(in srgb, var(--color-bg) 85%, transparent);
  position: sticky; top: 0; z-index: 10;
}
.nav-inner {
  max-width: 1400px;
  margin: 0 auto; padding: 0 12px;
  height: 100%; display: flex; align-items: center; gap: 8px;
}
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 1rem;
  color: var(--color-text); text-decoration: none; letter-spacing: -0.02em;
  white-space: nowrap;
}
.nav-logo:hover { color: var(--color-primary); }
.nav-logo svg { width: 20px; height: 21px; }
.nav-spacer { flex: 1; }
.nav-link {
  font-size: 0.8125rem; color: var(--color-text-muted);
  text-decoration: none; padding: 3px 8px;
  border-radius: var(--radius-sm); transition: color var(--transition-fast);
}
.nav-link:hover { color: var(--color-primary); }
.theme-toggle {
  background: none; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); cursor: pointer;
  padding: 3px 7px; font-size: 0.875rem; line-height: 1;
  color: var(--color-text-muted);
  transition: color var(--transition-fast), border-color var(--transition-fast);
}
.theme-toggle:hover { color: var(--color-text); border-color: var(--color-border-strong); }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun  { display: inline; }
:root .icon-sun  { display: none; }
:root .icon-moon { display: inline; }

/* === Layout (mobile-first) === */
main {
  max-width: 1400px; width: 100%;
  margin: 0 auto; padding: 12px;
  flex: 1; display: flex; flex-direction: column;
}
.columns {
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex: 1;
}
.col { display: flex; flex-direction: column; min-height: 0; }

/* === Panel headers === */
.panel-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px; min-height: 36px;
  flex-wrap: wrap;
}
.panel-label {
  font-size: 0.8125rem; font-weight: 500; color: var(--color-text-muted);
}
.panel-spacer { flex: 1; }

/* === Small controls (mobile-first: larger touch targets) === */
.small-select {
  padding: 6px 8px; font-size: 0.8125rem;
  font-family: var(--font-sans);
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  background: var(--color-bg-subtle); color: var(--color-text-muted); cursor: pointer;
  min-height: 32px;
}
.small-btn {
  padding: 6px 12px; font-size: 0.8125rem; font-weight: 500;
  font-family: var(--font-sans);
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  background: var(--color-bg-subtle); color: var(--color-text-muted);
  cursor: pointer; transition: all var(--transition-fast);
  min-height: 32px;
}
.small-btn:hover { color: var(--color-text); border-color: var(--color-border-strong); }
.small-btn-primary {
  background: var(--color-primary); color: #fff; border-color: var(--color-primary);
  white-space: nowrap;
}
.small-btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
.small-btn-copy {
  font-size: 0.875rem; padding: 2px 8px;
  color: color-mix(in srgb, var(--color-text) 90%, var(--color-primary));
  border-color: color-mix(in srgb, var(--color-text) 50%, var(--color-border));
}
.small-btn-copy:hover { color: var(--color-primary); border-color: var(--color-primary); }
.small-btn-cm {
  font-family: var(--font-mono); font-size: 0.6875rem; font-weight: 600;
  letter-spacing: 0.03em; opacity: 0.7;
}
.small-btn-cm:hover { opacity: 1; color: var(--color-primary); border-color: var(--color-primary); }
.small-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* === Info popover === */
.info-wrap { position: relative; }
.info-btn {
  background: none; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); cursor: pointer;
  padding: 3px 7px; font-size: 0.875rem; line-height: 1;
  color: var(--color-text-muted);
  transition: color var(--transition-fast), border-color var(--transition-fast);
  min-height: 32px; min-width: 32px;
  display: inline-flex; align-items: center; justify-content: center;
}
.info-btn:hover { color: var(--color-text); border-color: var(--color-border-strong); }
.info-popover {
  display: none; position: fixed; right: 12px; top: 54px;
  width: calc(100vw - 24px); max-width: 260px; padding: 14px 16px;
  background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); box-shadow: var(--shadow-md);
  font-size: 0.8125rem; line-height: 1.6; z-index: 20;
}
.info-popover.visible { display: block; }
.info-popover a { color: var(--color-primary); text-decoration: none; }
.info-popover a:hover { text-decoration: underline; }
.info-popover p { margin-bottom: 8px; }
.info-popover p:last-child { margin-bottom: 0; }

/* === Mode toggle === */
.mode-toggle {
  display: inline-flex; border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  overflow: hidden;
}
.mode-btn {
  padding: 4px 10px; font-size: 0.75rem; font-weight: 500;
  font-family: var(--font-sans);
  background: var(--color-bg-subtle); color: var(--color-text-muted);
  border: none; cursor: pointer;
  transition: all var(--transition-fast);
}
.mode-btn:not(:last-child) { border-right: 1px solid var(--color-border); }
.mode-btn:hover { color: var(--color-text); }
.mode-btn.active {
  background: var(--color-primary); color: #fff;
}

/* === Textarea === */
#input {
  width: 100%; flex: 1; min-height: 200px;
  padding: 12px; font-family: var(--font-mono);
  font-size: 16px; line-height: 1.55;
  color: var(--color-code-text); background: var(--color-code-bg);
  border: 1px solid var(--color-border); border-radius: var(--radius-md);
  resize: vertical; transition: border-color var(--transition-fast);
}
#input:focus {
  outline: none; border-color: var(--color-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 20%, transparent);
}

/* === Preview iframe === */
#preview {
  width: 100%; flex: 1; min-height: 200px;
  border: 1px solid var(--color-border); border-radius: var(--radius-md);
  background: #fff;
}

/* === Raw output === */
#rawOutput {
  width: 100%; flex: 1; min-height: 200px;
  padding: 12px; font-family: var(--font-mono);
  font-size: 0.8125rem; line-height: 1.5;
  color: var(--color-code-text); background: var(--color-code-bg);
  border: 1px solid var(--color-border); border-radius: var(--radius-md);
  overflow: auto; white-space: pre-wrap; word-break: break-word;
  display: none;
}
#rawOutput.raw-error {
  color: var(--color-error);
  border-color: var(--color-error);
}

/* === Toast === */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 8px 20px; border-radius: var(--radius-md);
  font-size: 0.8125rem; font-weight: 500;
  box-shadow: var(--shadow-md); opacity: 0;
  transition: transform 0.2s ease, opacity 0.2s ease;
  pointer-events: none; z-index: 100;
}
.toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-success { background: var(--color-success); color: #fff; }
.toast-error   { background: var(--color-error);   color: #fff; }

/* === Clipboard fallback === */
.clipboard-fallback {
  display: none; margin-top: 4px; gap: 6px; align-items: center;
  flex-wrap: wrap;
}
.clipboard-fallback.visible { display: flex; }
.clipboard-fallback input {
  flex: 1; min-width: 0; padding: 6px 8px; font-family: var(--font-mono); font-size: 0.8125rem;
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  background: var(--color-bg-subtle); color: var(--color-text);
}
.clipboard-fallback label { font-size: 0.75rem; color: var(--color-text-faint); white-space: nowrap; }

/* === Status bar === */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border-top: 1px solid var(--color-border);
  font-size: 0.6875rem; font-family: var(--font-mono);
  color: var(--color-text-faint);
  min-height: 28px;
  flex-wrap: wrap;
}
.status-bar-error { color: var(--color-error); }
.status-bar-spacer { flex: 1; }
.cli-hint { opacity: 0.65; cursor: pointer; display: none; }
.cli-hint:hover { opacity: 1; color: var(--color-primary); }

/* === Footer === */
footer {
  border-top: 1px solid var(--color-border);
  padding: 8px 12px; text-align: center;
  font-size: 0.6875rem; color: var(--color-text-faint);
}
footer a { color: var(--color-text-muted); text-decoration: none; }
footer a:hover { color: var(--color-primary); text-decoration: underline; }

/* === Desktop enhancements === */
@media (min-width: 768px) {
  .nav-inner { padding: 0 24px; gap: 12px; }
  main { padding: 16px 24px; }
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .panel-header { min-height: 28px; gap: 8px; }
  .small-select { padding: 2px 6px; font-size: 0.75rem; min-height: unset; }
  .small-btn { padding: 2px 10px; font-size: 0.75rem; min-height: unset; }
  .small-btn-cm { font-size: 0.625rem; }
  #input { min-height: 300px; padding: 14px; font-size: 0.8125rem; }
  #preview { min-height: 300px; }
  #rawOutput { min-height: 300px; padding: 14px; font-size: 0.75rem; }
  .info-popover { position: absolute; right: 0; top: calc(100% + 6px); width: 260px; }
  .info-btn { min-height: unset; min-width: unset; }
  .status-bar { padding: 6px 24px; gap: 12px; }
  .cli-hint { display: inline; }
  footer { padding: 8px 24px; }
}
</style>
</head>

        <span class="panel-label">Output</span>
        <select id="outputMode" class="small-select" aria-label="Output format">
          <option value="preview">Preview</option>
          <option value="html">HTML</option>
          <option value="markdown">Markdown</option>
          <option value="text">Text</option>
          <option value="json">JSON</option>
        </select>
        <select id="locale" class="small-select" aria-label="Number locale">
          <option value="">en-US</option>
          <option value="de-DE">de-DE</option>
          <option value="fr-FR">fr-FR</option>
          <option value="es-ES">es-ES</option>
          <option value="pt-BR">pt-BR</option>
          <option value="ja-JP">ja-JP</option>
          <option value="zh-CN">zh-CN</option>
          <option value="hi-IN">hi-IN</option>
          <option value="ar-SA">ar-SA</option>
          <option value="sv-SE">sv-SE</option>
        </select>
        <div class="panel-spacer"></div>
        <button id="copyBtn" class="small-btn" onclick="copyOutput()" style="display:none;">Copy</button>
        <button id="downloadBtn" class="small-btn" onclick="downloadOutput()" style="display:none;">Download</button>
      </div>
      <iframe id="preview" sandbox="allow-same-origin" frameborder="0"></iframe>
      <pre id="rawOutput"></pre>
    </div>
  </div>
</main>

<div class="status-bar" id="statusBar">
  <span id="statusMsg"></span>
  <div class="status-bar-spacer"></div>
  <span id="cliHint" class="cli-hint"></span>
  <span id="statusTime"></span>
</div>

<footer>
  <a href="https://calcmark.org">CalcMark</a> &middot; have a lark
</footer>

<div class="toast" id="toast"></div>

<script src="/lark.js"></script>
</body>
</html>
