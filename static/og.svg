<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="60" y="180" width="500" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="230" font-family="monospace" font-size="18" fill="#e5e5e5">price = 100 USD</text>
  <text x="80" y="260" font-family="monospace" font-size="18" fill="#e5e5e5">tax = 8.5%</text>
  <text x="80" y="290" font-family="monospace" font-size="18" fill="#e5e5e5">total = price + tax</text>
  <rect x="640" y="180" width="500" height="280" rx="8" fill="#161b22" stroke="#7D56F4" stroke-width="2" stroke-opacity="0.4"/>
  <rect x="660" y="220" width="460" height="100" rx="4" fill="#1c2128"/>
  <line x1="660" y1="220" x2="660" y2="320" stroke="#a371f7" stroke-width="4"/>
  <text x="680" y="252" font-family="monospace" font-size="17" fill="#e5e5e5">price = 100 USD</text>
  <text x="1060" y="252" font-family="monospace" font-size="17" fill="#a371f7" text-anchor="end">= $100.00</text>
  <text x="680" y="282" font-family="monospace" font-size="17" fill="#e5e5e5">tax = 8.5%</text>
  <text x="1060" y="282" font-family="monospace" font-size="17" fill="#a371f7" text-anchor="end">= 8.5%</text>
  <text x="680" y="312" font-family="monospace" font-size="17" fill="#e5e5e5">total = price + tax</text>
  <text x="1060" y="312" font-family="monospace" font-size="17" fill="#a371f7" text-anchor="end">= $108.50</text>
